<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — C.E.P.T. N° 5 de Miranda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <h1>C.E.P.T. N° 5 de Miranda</h1>
    <p>¿Tenés alguna consulta? Escribinos y te respondemos a la brevedad.</p>
  </header>

  <main>

    <!-- Tarjeta del formulario -->
    <section class="tarjeta">
      <form id="formulario" novalidate>
        <h2>Formulario de contacto</h2>

        <div class="campo">
          <label for="nombre">Nombre y apellido</label>
          <input type="text" id="nombre" name="nombre" required
                 placeholder="Ej: María González" aria-describedby="error-nombre">
          <span id="error-nombre" class="error" aria-live="polite"></span>
        </div>

        <div class="campo">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" required
                 placeholder="ejemplo@correo.com" aria-describedby="error-email">
          <span id="error-email" class="error" aria-live="polite"></span>
        </div>

        <div class="campo">
          <label for="telefono">Teléfono <span class="opcional">(opcional)</span></label>
          <input type="tel" id="telefono" name="telefono"
                 placeholder="Ej: 02296 123456" aria-describedby="error-telefono">
          <span id="error-telefono" class="error" aria-live="polite"></span>
        </div>

        <div class="campo">
          <label for="asunto">Asunto</label>
          <select id="asunto" name="asunto" required aria-describedby="error-asunto">
            <option value="" disabled selected>Seleccioná un asunto…</option>
            <option value="informacion-general">Información general</option>
            <option value="inscripcion">Inscripción</option>
            <option value="pedagogia-alternancia">Pedagogía de la Alternancia</option>
            <option value="otro">Otro</option>
          </select>
          <span id="error-asunto" class="error" aria-live="polite"></span>
        </div>

        <div class="campo">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" required minlength="10" rows="5"
                    placeholder="Escribí tu consulta acá…" aria-describedby="error-mensaje"></textarea>
          <span id="error-mensaje" class="error" aria-live="polite"></span>
        </div>

        <button type="submit">Enviar consulta</button>

      </form>

      <!-- Panel de confirmación, aparece al enviar correctamente -->
      <div id="confirmacion" class="confirmacion oculto" tabindex="-1" role="status">
        <div class="icono-check" aria-hidden="true">
          <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
            <circle class="circulo" cx="26" cy="26" r="24" fill="none"/>
            <path class="tilde" fill="none" d="M13 27 l9 9 l17-18"/>
          </svg>
        </div>
        <h2>¡Consulta enviada!</h2>
        <p>Gracias por escribirnos. Te responderemos a la brevedad.</p>
        <button type="button" id="btn-nueva">Hacer otra consulta</button>
      </div>

    </section>

  </main>

  <footer>
    <p>C.E.P.T. N° 5 — Miranda, Rauch, Buenos Aires</p>
  </footer>

  <script src="js/validacion.js"></script>
</body>
</html>
